---
- name: Include vars for OpenVPN installation
  include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}{{ ansible_distribution_major_version }}.yml"
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"
    - "../vars/empty.yml"

- name: Uninstall OpenVPN
  include_tasks: uninstall.yml
  vars:
    openvpn_proto: "{{openvpn_listen_var.proto}}"
    openvpn_port: "{{openvpn_listen_var.port}}"
  loop: "{{openvpn_listen}}"
  loop_control:
    loop_var: openvpn_listen_var
  when: openvpn_uninstall

- name: Install OpenVPN
  import_tasks: install.yml
  tags:
    - install

- name: Copy or Generate server keys
  import_tasks: server_keys.yml

# ignoreerrors is required for CentOS/RHEL 6
# http://serverfault.com/questions/477718/sysctl-p-etc-sysctl-conf-returns-error
- name: Enable ipv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    ignoreerrors: true
  failed_when: false
  when: not ci_build

- name: Enable ipv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    ignoreerrors: true
  when: openvpn_server_ipv6_network is defined and not ci_build

- name: Configure SELinux
  import_tasks: selinux.yml
  when:
    - ansible_selinux.status == "enabled"

- name: Detect firewall type
  include_tasks: firewall.yml
  vars:
    openvpn_proto: "{{openvpn_listen_var.proto}}"
    openvpn_port: "{{openvpn_listen_var.port}}"
  loop: "{{openvpn_listen}}"
  loop_control:
    loop_var: openvpn_listen_var
  when:
    - not ci_build
    - manage_firewall_rules
  tags:
    - firewall

- name: Compare existing certs against 'clients' variable
  import_tasks: cert_sync_detection.yml
  when: openvpn_sync_certs
  tags:
    - sync_certs

- name: Generate revocation list and clean up
  import_tasks: revocation.yml
  when: >-
    (openvpn_revoke_these_certs is defined)
    or
    (openvpn_sync_certs and cert_sync_certs_to_revoke.stdout_lines | length > 0)
    or
    (openvpn_invalid_certs | length > 0)

- set_fact:
    openvpn_udp_port: "{{openvpn_listen | d([]) | selectattr('proto', '==', 'udp') | map(attribute='port') }}"
    openvpn_tcp_port: "{{openvpn_listen | d([]) | selectattr('proto', '==', 'tcp') | map(attribute='port') }}"
    __openvpn_addl_client_options: "{{openvpn_addl_client_options | d([])}}"

- set_fact:
    openvpn_udp_remote: >
        {{
                ["remote " + openvpn_server_hostname ] | product(openvpn_udp_port[1:]) | map('join', ' ')
        }}
    openvpn_tcp_remote: >
        {{
                ["remote " + openvpn_server_hostname ] | product(openvpn_tcp_port[1:]) | map('join', ' ')
        }}

- name: Generate data for proto tcp
  include_tasks: client_keys.yml
  vars:
    openvpn_proto: "tcp"
    openvpn_port: "{{openvpn_tcp_port[0]}}"
    openvpn_addl_client_options: "{{__openvpn_addl_client_options + openvpn_tcp_remote}}"
  when: clients is defined

- name: Generate data for proto udp
  include_tasks: client_keys.yml
  vars:
    openvpn_proto: "udp"
    openvpn_port: "{{openvpn_udp_port[0]}}"
    openvpn_addl_client_options: "{{__openvpn_addl_client_options + openvpn_udp_remote}}"
  when: clients is defined

- name: Configure OpenVPN server
  include_tasks: config.yml
  vars:
    openvpn_proto: "{{openvpn_listen_var.proto}}"
    openvpn_port: "{{openvpn_listen_var.port}}"
    openvpn_server_network: "{{openvpn_listen_var.server_network}}"
  loop: "{{openvpn_listen}}"
  loop_control:
    loop_var: openvpn_listen_var
